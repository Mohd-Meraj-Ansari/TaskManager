<div class="max-w-7xl mx-auto">
  <h1 class="text-3xl font-bold text-center p-4">Task Manager</h1>
</div>

<div class="grid grid-cols-4 gap-4 px-4">
  <!-- task form -->
  <app-task-form />

  <!-- todo tasks -->
  <app-task-list [tasks]="todoItems()" [heading]="'To Do'" />

  <!-- inprogress tasks -->
  <app-task-list [tasks]="inProgressItems()" [heading]="'In Progess'" />

  <!-- completed tasks -->
  <app-task-list [tasks]="completedItems()" [heading]="'Completed'" />
</div>
