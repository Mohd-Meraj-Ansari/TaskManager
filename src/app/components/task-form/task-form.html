<form class="" [formGroup]="taskForm" (ngSubmit)="onSubmit()">
  <div class="">
    <label for="task" class="block text-center text-xl font-semibold mb-3">Task</label>
    <textarea
      name=""
      id="task"
      class="w-full bg-slate-200 rounded h-40 mt-1 p-2 border border-slate-900"
      formControlName="task"
    ></textarea>
  </div>
  <div>
    <select
      name=""
      id=""
      class="w-full bg-slate-200 border border-slate-900 rounded mt-2"
      formControlName="status"
    >
      <option value="Todo">Todo</option>
      <option value="InProgress">In Progress</option>
      <option value="Completed">Completed</option>
    </select>
  </div>

  <div>
    <button type="submit" class="bg-blue-500 px-3 py-1 rounded border-blue-600 cursor-pointer mt-2">
      Add Task
    </button>
  </div>
</form>
